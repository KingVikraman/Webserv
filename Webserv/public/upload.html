<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upload Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#C9A84C;--gold-bright:#F2D48B;--carbon:#080B0F;--panel:rgba(14,18,24,0.90);--panel2:rgba(20,25,32,0.95);--border:rgba(201,168,76,0.28);--border-hot:rgba(201,168,76,0.75);--text:rgba(230,235,242,0.92);--muted:rgba(180,188,200,0.55);--ok:#3DDB87;--err:#FF5470;--info:#5BB8FF;}
body{font-family:"Rajdhani",sans-serif;background-color:var(--carbon);background-image:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(201,168,76,0.07) 0%,transparent 65%),radial-gradient(ellipse 50% 30% at 85% 100%,rgba(201,168,76,0.05) 0%,transparent 60%),repeating-linear-gradient(45deg,#080B0F 0px,#080B0F 10px,#0B0E14 10px,#0B0E14 20px),repeating-linear-gradient(-45deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 9px,transparent 9px,transparent 18px);color:var(--text);min-height:100vh;}
.wrap{max-width:900px;margin:0 auto;padding:2rem 1rem 3rem;}
.panel{background:linear-gradient(145deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:1rem;padding:1.3rem;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),0 20px 50px rgba(0,0,0,0.55);}
.display{font-family:"Orbitron",sans-serif;letter-spacing:0.06em;color:var(--gold-bright);}
.small{color:var(--muted);font-size:0.9rem;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0.65rem 1.2rem;border-radius:0.6rem;border:1px solid var(--border);background:linear-gradient(140deg,rgba(201,168,76,0.15),rgba(201,168,76,0.04));color:var(--gold-bright);font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;}
.btn:hover{transform:translateY(-2px);border-color:var(--border-hot);box-shadow:0 0 0 1px rgba(201,168,76,.3),0 0 24px rgba(201,168,76,.18);}
.field{width:100%;padding:.65rem .9rem;border-radius:.55rem;border:1px solid rgba(201,168,76,0.28);background:rgba(5,8,13,.7);color:var(--text);}
.drop{border:2px dashed rgba(201,168,76,.35);border-radius:.8rem;padding:1.4rem;text-align:center;position:relative;background:rgba(201,168,76,.03);}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.progress-shell{height:8px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.2);}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#7a5e1e,var(--gold),var(--gold-bright));transition:width .2s;}
#preview{max-width:100%;max-height:280px;border:1px solid var(--border);border-radius:.6rem;display:none;margin-top:1rem;background:#000;}
#fileLink{display:none;margin-top:.75rem;color:var(--gold-bright);text-decoration:none;font-weight:600;}
#toasts{position:fixed;top:1rem;right:1rem;display:flex;flex-direction:column;gap:8px;width:min(92vw,320px);z-index:9999;}
.toast{border-radius:.7rem;padding:.75rem .9rem;border:1px solid rgba(255,255,255,.1);background:rgba(10,13,20,.94);}
</style>
</head>
<body>
<div id="toasts"></div>
<div class="wrap">
  <div class="panel" style="margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;">
    <div>
      <h1 class="display" style="font-size:1.3rem;">FILE UPLOAD</h1>
      <p class="small">POST multipart/form-data to /uploads/ with progress and preview.</p>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
      <a class="btn" href="/">Hero</a>
      <a class="btn" href="/delete.html">Delete</a>
      <a class="btn" href="/methods.html">Methods</a>
      <a class="btn" href="/list">List</a>
    </div>
  </div>

  <div class="panel">
    <label class="small" style="display:block;margin-bottom:.5rem;">Select file</label>
    <div class="drop" id="dropzone">
      <input id="fileInput" type="file"/>
      <p id="picked" class="small">Drop file or click to choose</p>
    </div>

    <div style="margin-top:.9rem;display:none;" id="progressWrap">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span class="small">Upload progress</span><span id="pct" class="small">0%</span></div>
      <div class="progress-shell"><div id="bar" class="progress-bar"></div></div>
    </div>

    <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem;">
      <button class="btn" id="uploadBtn">Upload to /uploads/</button>
    </div>

    <p id="resp" class="small" style="margin-top:.8rem;"></p>
    <img id="preview" alt="Uploaded image preview"/>
    <a id="fileLink" target="_blank" rel="noopener">Open uploaded file</a>
  </div>
</div>

<script>
function toast(msg,color){
  var t=document.createElement('div');
  t.className='toast';
  t.style.color=color||'var(--info)';
  t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(function(){t.remove();},2600);
}

var fileInput=document.getElementById('fileInput');
var picked=document.getElementById('picked');
var progressWrap=document.getElementById('progressWrap');
var bar=document.getElementById('bar');
var pct=document.getElementById('pct');
var resp=document.getElementById('resp');
var preview=document.getElementById('preview');
var fileLink=document.getElementById('fileLink');

fileInput.addEventListener('change',function(){picked.textContent=this.files[0]?this.files[0].name:'Drop file or click to choose';});

document.getElementById('uploadBtn').addEventListener('click',function(){
  var file=fileInput.files[0];
  if(!file){toast('Select a file first','var(--err)');return;}

  var form=new FormData();
  form.append('file',file,file.name);

  progressWrap.style.display='block';
  bar.style.width='0%';
  pct.textContent='0%';
  preview.style.display='none';
  fileLink.style.display='none';
  resp.textContent='';

  var xhr=new XMLHttpRequest();
  xhr.open('POST','/uploads/',true);

  xhr.upload.onprogress=function(e){
    if(e.lengthComputable){
      var p=Math.round((e.loaded/e.total)*100);
      bar.style.width=p+'%';
      pct.textContent=p+'%';
    }
  };

  xhr.onload=function(){
    var ok=xhr.status>=200&&xhr.status<300;
    resp.textContent='HTTP '+xhr.status+' - '+xhr.responseText.trim();
    if(!ok){toast('Upload failed ('+xhr.status+')','var(--err)');return;}

    toast('Upload successful','var(--ok)');

    var m=xhr.responseText.match(/File uploaded:\s*(.+)$/i);
    if(!m){return;}

    var uploaded=m[1].trim();
    var url='/uploads/'+encodeURIComponent(uploaded);
    fileLink.href=url;
    fileLink.textContent='Open uploaded file: '+uploaded;
    fileLink.style.display='inline-block';

    var lower=uploaded.toLowerCase();
    if(lower.indexOf('.png')!==-1||lower.indexOf('.jpg')!==-1||lower.indexOf('.jpeg')!==-1||lower.indexOf('.gif')!==-1||lower.indexOf('.webp')!==-1||lower.indexOf('.bmp')!==-1){
      preview.src=url;
      preview.style.display='block';
    }
  };

  xhr.onerror=function(){toast('Network error during upload','var(--err)');};
  xhr.send(form);
});
</script>
</body>
</html>
