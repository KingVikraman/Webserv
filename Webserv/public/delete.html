<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Delete Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#C9A84C;--gold-bright:#F2D48B;--carbon:#080B0F;--panel:rgba(14,18,24,0.90);--panel2:rgba(20,25,32,0.95);--border:rgba(201,168,76,0.28);--border-hot:rgba(201,168,76,0.75);--text:rgba(230,235,242,0.92);--muted:rgba(180,188,200,0.55);--ok:#3DDB87;--err:#FF5470;--info:#5BB8FF;}
*{box-sizing:border-box;}body{margin:0;font-family:"Rajdhani",sans-serif;background:#080B0F;color:var(--text);min-height:100vh;background-image:repeating-linear-gradient(45deg,#080B0F 0px,#080B0F 10px,#0B0E14 10px,#0B0E14 20px);} .wrap{max-width:900px;margin:0 auto;padding:2rem 1rem;} .panel{background:linear-gradient(145deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:1rem;padding:1.3rem;box-shadow:0 16px 45px rgba(0,0,0,.55);} .display{font-family:"Orbitron",sans-serif;color:var(--gold-bright);} .small{color:var(--muted);} .btn{display:inline-flex;align-items:center;justify-content:center;padding:.65rem 1.2rem;border-radius:.6rem;border:1px solid var(--border);background:linear-gradient(140deg,rgba(201,168,76,.15),rgba(201,168,76,.04));color:var(--gold-bright);font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:.2s;} .btn:hover{transform:translateY(-2px);border-color:var(--border-hot);} .field{width:100%;padding:.7rem .9rem;border-radius:.55rem;border:1px solid rgba(201,168,76,.3);background:rgba(5,8,13,.7);color:var(--text);} #toasts{position:fixed;top:1rem;right:1rem;display:flex;flex-direction:column;gap:8px;width:min(92vw,320px);} .toast{border-radius:.7rem;padding:.75rem .9rem;border:1px solid rgba(255,255,255,.1);background:rgba(10,13,20,.94);} 
</style>
</head>
<body>
<div id="toasts"></div>
<div class="wrap">
  <div class="panel" style="margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;">
    <div><h1 class="display" style="font-size:1.3rem;">DELETE FILE</h1><p class="small">Delete from uploads storage by filename.</p></div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;"><a class="btn" href="/">Hero</a><a class="btn" href="/upload.html">Upload</a><a class="btn" href="/methods.html">Methods</a><a class="btn" href="/list">List</a></div>
  </div>

  <div class="panel">
    <label class="small" for="name" style="display:block;margin-bottom:.5rem;">Filename in /uploads</label>
    <input id="name" class="field" placeholder="Picture_1.png"/>
    <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem;"><button id="delBtn" class="btn">Send DELETE</button></div>
    <p id="resp" class="small" style="margin-top:.8rem;"></p>
  </div>
</div>

<script>
function toast(msg,color){var t=document.createElement('div');t.className='toast';t.style.color=color||'var(--info)';t.textContent=msg;document.getElementById('toasts').appendChild(t);setTimeout(function(){t.remove();},2600);} 

async function doDelete(){
  var name=document.getElementById('name').value.trim();
  if(!name){toast('Enter a filename','var(--err)');return;}
  try{
    var res=await fetch('/uploads/'+encodeURIComponent(name),{method:'DELETE'});
    var ok=(res.status===204||res.status===200);
    document.getElementById('resp').textContent='HTTP '+res.status+(ok?' - deleted':' - failed');
    toast(ok?'Deleted '+name:'Delete failed ('+res.status+')',ok?'var(--ok)':'var(--err)');
  }catch(e){toast('Request failed','var(--err)');}
}

document.getElementById('delBtn').addEventListener('click',doDelete);
document.getElementById('name').addEventListener('keydown',function(e){if(e.key==='Enter')doDelete();});
</script>
</body>
</html>
