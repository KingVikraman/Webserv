server {
    listen 8000
    server_name localhost
    client_max_body_size 10485760

    location / {
        root ./public
        index index.html
        allowed_methods GET POST DELETE
        autoindex off
    }

    location /upload {
        root ./public
        allowed_methods GET POST DELETE
        upload_store ./uploads
        autoindex on
    }

    location /uploads {
        root ./public
        allowed_methods GET POST DELETE
        upload_store ./uploads
        autoindex on
    }

    location /list {
        root ./uploads
        allowed_methods GET
        autoindex on
    }

    location /redirect {
        root ./public
        allowed_methods GET
        autoindex off
    }

    location /alias {
        root ./public
        allowed_methods GET
        autoindex off
    }
}